name: Build hwbp_driver

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout driver code
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt update
          sudo apt install -y aria2 libelf-dev libssl-dev bc flex bison

      - name: Download kernel source
        run: |
          mkdir kernel_workspace
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/android_kernel_common_oneplus_sm8750.git -b oneplus/sm8750_v_16.0.0_oneplus_13_6.6.89 common

      - name: Download toolchain
        run: |
          cd kernel_workspace
          mkdir -p clang18
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip
          unzip -q clang.zip -d clang18
          rm clang.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip
          rm build-tools.zip

      - name: Restore Module.symvers from cache
        uses: actions/cache@v4
        with:
          path: kernel_workspace/common/Module.symvers
          key: kernel-symvers-${{ runner.os }}

      - name: Configure kernel
        run: |
          cd kernel_workspace/common
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang18/bin:$GITHUB_WORKSPACE/kernel_workspace/build-tools/bin:$PATH
          export LLVM=1
          make ARCH=arm64 gki_defconfig

      - name: Prepare kernel for module compilation
        run: |
          cd kernel_workspace/common
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang18/bin:$GITHUB_WORKSPACE/kernel_workspace/build-tools/bin:$PATH
          export LLVM=1
          make ARCH=arm64 modules_prepare

      - name: Build driver
        run: |
          cd kernel_workspace/common
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang18/bin:$GITHUB_WORKSPACE/kernel_workspace/build-tools/bin:$PATH
          export LLVM=1
          cp $GITHUB_WORKSPACE/hwbp_driver.c ./
          echo "obj-m := hwbp_driver.o" > Makefile
          make ARCH=arm64 M=$(pwd) modules
          cp hwbp_driver.ko $GITHUB_WORKSPACE/6.6.ko

      - name: Upload .ko
        uses: actions/upload-artifact@v4
        with:
          name: 6.6
          path: ${{ github.workspace }}/6.6.ko
